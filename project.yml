name: Miryam
options:
  bundleIdPrefix: io.swift-yah
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  groupSortPosition: none
  generateEmptyDirectories: true
  transitivelyLinkDependencies: true

packages:
  MiryamCore:
    path: Packages/MiryamCore
  MiryamNetworking:
    path: Packages/MiryamNetworking
  MiryamPersistence:
    path: Packages/MiryamPersistence
  MiryamPlayer:
    path: Packages/MiryamPlayer
  MiryamFeatures:
    path: Packages/MiryamFeatures
  MiryamUI:
    path: Packages/MiryamUI
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

targets:
  Miryam:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Miryam
        excludes:
          - "**/*.md"
    resources:
      - Miryam/Assets.xcassets
      - path: Miryam/TestFixtures
        buildPhase: resources
    entitlements:
      path: Miryam/Miryam.entitlements
      properties:
        aps-environment: development
        com.apple.developer.icloud-container-identifiers:
          - iCloud.io.swift-yah.miryam
        com.apple.developer.icloud-container-environment: Production
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.carplay-audio: true
    info:
      path: Miryam/Info.plist
      properties:
        UIBackgroundModes:
          - remote-notification
          - audio
        CFBundleDisplayName: Miryam
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - package: MiryamUI
      - package: MiryamFeatures
      - package: MiryamCore
      - package: MiryamNetworking
      - package: MiryamPlayer
      - package: MiryamPersistence
      - sdk: WatchConnectivity.framework
      - target: MiryamWatch
        embed: true
        codeSign: true
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam
        DEVELOPMENT_TEAM: ${APPLE_TEAM_ID}
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore io.swift-yah.miryam"
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

  MiryamTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - MiryamTests
    dependencies:
      - target: Miryam
      - package: MiryamCore
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam.tests

  MiryamWatchTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - MiryamWatchTests
    dependencies:
      - target: MiryamWatch
      - package: MiryamCore
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam.watchtests

  MiryamVisionTests:
    type: bundle.unit-test
    platform: visionOS
    deploymentTarget: "1.0"
    sources:
      - MiryamVisionTests
    dependencies:
      - target: MiryamVision
      - package: MiryamCore
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam.visiontests

  MiryamSmokeXCUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - MiryamSmokeXCUITests
    dependencies:
      - target: Miryam
      - package: MiryamUI
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam.smokexcuitests

  MiryamAccessibilityXCUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - MiryamAccessibilityXCUITests
    dependencies:
      - target: Miryam
      - package: MiryamUI
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam.accessibilityxcuitests

  MiryamWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: MiryamWatch
        excludes:
          - "**/*.md"
    info:
      path: MiryamWatch/Info.plist
      properties:
        CFBundleDisplayName: Miryam
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleIconName: AppIcon
        WKApplication: true
        WKCompanionAppBundleIdentifier: io.swift-yah.miryam
    dependencies:
      - package: MiryamCore
      - package: MiryamFeatures
      - package: MiryamUI
      - package: MiryamNetworking
      - sdk: WatchConnectivity.framework
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam.watchkitapp
        DEVELOPMENT_TEAM: ${APPLE_TEAM_ID}
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore io.swift-yah.miryam.watchkitapp"

  MiryamVision:
    type: application
    platform: visionOS
    deploymentTarget: "1.0"
    sources:
      - path: MiryamVision
        excludes:
          - "**/*.md"
    info:
      path: MiryamVision/Info.plist
      properties:
        CFBundleDisplayName: Miryam
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    dependencies:
      - package: MiryamUI
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam.vision
        DEVELOPMENT_TEAM: ${APPLE_TEAM_ID}
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES

  MiryamTV:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: MiryamTV
        excludes:
          - "**/*.md"
    resources:
      - MiryamTV/Assets.xcassets
    info:
      path: MiryamTV/Info.plist
      properties:
        CFBundleDisplayName: Miryam
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
    dependencies:
      - package: MiryamUI
      - package: MiryamFeatures
      - package: MiryamCore
      - package: MiryamPersistence
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam
        DEVELOPMENT_TEAM: ${APPLE_TEAM_ID}
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_TOP_SHELF_IMAGE: "Top Shelf Image"
        ASSETCATALOG_COMPILER_TOP_SHELF_IMAGE_WIDE: "Top Shelf Image Wide"
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore io.swift-yah.miryam tvos"
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

  MiryamSnapshotTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Packages/MiryamUI/Tests/MiryamSnapshotTests
    dependencies:
      - target: Miryam
      - package: MiryamUI
      - package: MiryamFeatures
      - package: MiryamCore
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam.snapshottests

  MiryamSnapshotTestsTV:
    type: bundle.unit-test
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: Packages/MiryamUI/Tests/MiryamSnapshotTests
    dependencies:
      - target: MiryamTV
      - package: MiryamUI
      - package: MiryamFeatures
      - package: MiryamCore
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam.snapshottests.tv

schemes:
  Miryam:
    build:
      targets:
        Miryam: all
        MiryamWatch: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release

  MiryamAppUnitTests:
    build:
      targets:
        Miryam: all
    test:
      config: Debug
      targets:
        - MiryamTests
      coverageTargets:
        - Miryam

  MiryamWatchUnitTests:
    build:
      targets:
        MiryamWatch: all
    test:
      config: Debug
      targets:
        - MiryamWatchTests
      coverageTargets:
        - MiryamWatch

  MiryamVisionUnitTests:
    build:
      targets:
        MiryamVision: all
    test:
      config: Debug
      targets:
        - MiryamVisionTests
      coverageTargets:
        - MiryamVision

  MiryamSnapshotTests:
    build:
      targets:
        Miryam: all
    test:
      config: Debug
      targets:
        - MiryamSnapshotTests
      coverageTargets:
        - Miryam

  MiryamAccessibilityXCUITests:
    build:
      targets:
        Miryam: all
    test:
      config: Debug
      targets:
        - MiryamAccessibilityXCUITests
      coverageTargets:
        - Miryam

  MiryamSmokeXCUITests:
    build:
      targets:
        Miryam: all
    test:
      config: Debug
      targets:
        - MiryamSmokeXCUITests
      coverageTargets:
        - Miryam

  AllTests:
    build:
      targets:
        Miryam: all
        MiryamWatch: all
        MiryamTV: all
        MiryamVision: all
    test:
      config: Debug
      targets:
        - MiryamTests
        - MiryamWatchTests
        - MiryamVisionTests
        - MiryamSnapshotTests
        - MiryamAccessibilityXCUITests
        - MiryamSmokeXCUITests
        - MiryamSnapshotTestsTV
      coverageTargets:
        - Miryam
        - MiryamWatch
        - MiryamTV
        - MiryamVision

  MiryamWatch:
    build:
      targets:
        MiryamWatch: all
    run:
      config: Debug

  MiryamTV:
    build:
      targets:
        MiryamTV: all
    run:
      config: Debug

  MiryamTVSnapshotTests:
    build:
      targets:
        MiryamTV: all
    test:
      config: Debug
      targets:
        - MiryamSnapshotTestsTV
      coverageTargets:
        - MiryamTV

  MiryamVision:
    build:
      targets:
        MiryamVision: all
    run:
      config: Debug
