name: Miryam
options:
  bundleIdPrefix: io.swift-yah
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  groupSortPosition: none
  generateEmptyDirectories: true
  transitivelyLinkDependencies: true

packages:
  MiryamCore:
    path: Packages/MiryamCore
  MiryamNetworking:
    path: Packages/MiryamNetworking
  MiryamPersistence:
    path: Packages/MiryamPersistence
  MiryamPlayer:
    path: Packages/MiryamPlayer
  MiryamFeatures:
    path: Packages/MiryamFeatures
  MiryamUI:
    path: Packages/MiryamUI
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

targets:
  Miryam:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Miryam
        excludes:
          - "**/*.md"
    resources:
      - Miryam/Assets.xcassets
    entitlements:
      path: Miryam/Miryam.entitlements
      properties:
        aps-environment: development
        com.apple.developer.icloud-container-identifiers:
          - iCloud.io.swift-yah.miryam
        com.apple.developer.icloud-container-environment: Production
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.carplay-audio: true
    info:
      path: Miryam/Info.plist
      properties:
        UIBackgroundModes:
          - remote-notification
          - audio
        CFBundleDisplayName: Miryam
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - package: MiryamUI
      - package: MiryamFeatures
      - package: MiryamCore
      - package: MiryamPersistence
      - target: MiryamWatch
        embed: true
        codeSign: true
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam
        DEVELOPMENT_TEAM: ${APPLE_TEAM_ID}
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore io.swift-yah.miryam"
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

  MiryamTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - MiryamTests
    dependencies:
      - target: Miryam
      - package: MiryamCore
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam.tests

  MiryamUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - MiryamUITests
    dependencies:
      - target: Miryam
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam.uitests

  MiryamWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: MiryamWatch
        excludes:
          - "**/*.md"
    info:
      path: MiryamWatch/Info.plist
      properties:
        CFBundleDisplayName: Miryam
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleIconName: AppIcon
        WKApplication: true
        WKCompanionAppBundleIdentifier: io.swift-yah.miryam
    dependencies:
      - package: MiryamCore
      - package: MiryamPlayer
      - package: MiryamFeatures
      - package: MiryamUI
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam.watchkitapp
        DEVELOPMENT_TEAM: ${APPLE_TEAM_ID}
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          DEBUG_INFORMATION_FORMAT: dwarf
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore io.swift-yah.miryam.watchkitapp"

  MiryamVision:
    type: application
    platform: visionOS
    deploymentTarget: "1.0"
    sources:
      - path: MiryamVision
        excludes:
          - "**/*.md"
    info:
      path: MiryamVision/Info.plist
      properties:
        CFBundleDisplayName: Miryam
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    dependencies:
      - package: MiryamUI
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam.vision
        DEVELOPMENT_TEAM: ${APPLE_TEAM_ID}
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES

  MiryamTV:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: MiryamTV
        excludes:
          - "**/*.md"
    info:
      path: MiryamTV/Info.plist
      properties:
        CFBundleDisplayName: Miryam
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    dependencies:
      - package: MiryamUI
      - package: MiryamFeatures
      - package: MiryamCore
      - package: MiryamPersistence
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam.tv
        DEVELOPMENT_TEAM: ${APPLE_TEAM_ID}
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES

  MiryamSnapshotTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Packages/MiryamUI/Tests/MiryamUITests
    dependencies:
      - target: Miryam
      - package: MiryamUI
      - package: MiryamFeatures
      - package: MiryamCore
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam.snapshottests

  MiryamSnapshotTestsTV:
    type: bundle.unit-test
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: Packages/MiryamUI/Tests/MiryamUITests
    dependencies:
      - target: MiryamTV
      - package: MiryamUI
      - package: MiryamFeatures
      - package: MiryamCore
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.swift-yah.miryam.snapshottests.tv

schemes:
  Miryam:
    build:
      targets:
        Miryam: all
        MiryamWatch: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MiryamTests
        - MiryamUITests
        - MiryamSnapshotTests
      coverageTargets:
        - Miryam
    profile:
      config: Release
    archive:
      config: Release

  MiryamWatch:
    build:
      targets:
        MiryamWatch: all
    run:
      config: Debug

  MiryamTV:
    build:
      targets:
        MiryamTV: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MiryamSnapshotTestsTV
      coverageTargets:
        - MiryamTV

  MiryamVision:
    build:
      targets:
        MiryamVision: all
    run:
      config: Debug
