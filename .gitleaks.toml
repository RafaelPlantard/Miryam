# Gitleaks configuration
# https://github.com/gitleaks/gitleaks

title = "Miryam gitleaks config"

[extend]
useDefault = true

[[allowlist.paths]]
description = "Ignore .env.example (contains placeholders, not real secrets)"
regex = '''\.env\.example$'''

[[allowlist.paths]]
description = "Ignore snapshot test reference images"
regex = '''__Snapshots__/'''
