name: Record Snapshots

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record:
    name: Record Snapshot References
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Mint
        run: which mint || brew install mint

      - name: Bootstrap Mint tools
        run: mint bootstrap

      - name: Generate Xcode project
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: mint run xcodegen generate

      - name: Delete existing snapshot references
        run: |
          find Packages/MiryamUI/Tests/MiryamUITests/Snapshots/__Snapshots__ -name "*.png" -delete
          echo "Deleted all existing snapshot reference images"

      - name: Clean derived data
        run: rm -rf ~/Library/Developer/Xcode/DerivedData/Miryam-*

      - name: Record all snapshots
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TEST_RUNNER_SNAPSHOT_RECORD: all
        run: |
          set -o pipefail
          xcodebuild test \
            -project Miryam.xcodeproj \
            -scheme Miryam \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17 Pro Max' \
            -only-testing:MiryamSnapshotTests \
            2>&1 | mint run xcbeautify || true

      - name: Show recorded snapshots
        run: |
          echo "=== Recorded snapshot reference images ==="
          find Packages/MiryamUI/Tests/MiryamUITests/Snapshots/__Snapshots__ -name "*.png" | sort
          echo "Total: $(find Packages/MiryamUI/Tests/MiryamUITests/Snapshots/__Snapshots__ -name '*.png' | wc -l) images"

      - name: Commit and push updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Packages/MiryamUI/Tests/MiryamUITests/Snapshots/__Snapshots__/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit"
          else
            git commit -m "chore(test): re-record snapshot references on CI runner"
            git push
          fi
