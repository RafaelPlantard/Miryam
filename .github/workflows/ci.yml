name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Mint
        run: which mint || brew install mint

      - name: Bootstrap Mint tools
        run: mint bootstrap

      - name: SwiftLint
        run: mint run swiftlint lint --strict

      - name: SwiftFormat check
        run: mint run swiftformat --lint .

  unit-tests:
    name: Unit Tests
    runs-on: self-hosted
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Mint
        run: which mint || brew install mint

      - name: Bootstrap Mint tools
        run: mint bootstrap

      - name: Generate Xcode project
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: mint run xcodegen generate

      - name: Prepare unit test output directories
        run: mkdir -p TestResults/Unit TestReports/Unit Coverage/Unit

      - name: Run app unit tests
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild test \
            -project Miryam.xcodeproj \
            -scheme MiryamAppUnitTests \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17 Pro Max' \
            -resultBundlePath TestResults/Unit/MiryamAppUnitTests.xcresult \
            -enableCodeCoverage YES \
            2>&1 | mint run xcbeautify \
              --report junit \
              --report-path TestReports/Unit \
              --junit-report-filename MiryamAppUnitTests.junit.xml

      - name: Run package unit tests
        run: |
          set -euo pipefail
          for package in MiryamCore MiryamNetworking MiryamPersistence MiryamPlayer MiryamFeatures; do
            swift test \
              --package-path "Packages/${package}" \
              --enable-code-coverage \
              --xunit-output "TestReports/Unit/${package}.junit.xml" \
              2>&1 | mint run xcbeautify

            coverage_path=$(swift test \
              --package-path "Packages/${package}" \
              --show-codecov-path)

            if [ -f "$coverage_path" ]; then
              cp "$coverage_path" "Coverage/Unit/${package}.json"
            else
              echo "::warning::Coverage file not found for ${package} at ${coverage_path}"
            fi
          done

      - name: Report coverage
        if: always()
        run: |
          if [ -d TestResults/Unit/MiryamAppUnitTests.xcresult ]; then
            COVERAGE=$(xcrun xccov view --report --json TestResults/Unit/MiryamAppUnitTests.xcresult \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['lineCoverage']*100)" 2>/dev/null || echo "0")
            echo "MiryamAppUnitTests.xcresult: ${COVERAGE}%"
          else
            echo "No test results found - skipping coverage report"
          fi

      - name: Install xcresultparser
        if: always()
        run: which xcresultparser || brew install xcresultparser

      - name: Export coverage reports
        if: always()
        run: |
          if [ -d TestResults/Unit/MiryamAppUnitTests.xcresult ]; then
            xcresultparser --output-format cobertura TestResults/Unit/MiryamAppUnitTests.xcresult > Coverage/Unit/MiryamAppUnitTests.xml
          fi

      - name: Install gpg (needed by Codecov)
        if: always()
        run: which gpg || brew install gnupg

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          files: Coverage/Unit/MiryamAppUnitTests.xml,Coverage/Unit/MiryamCore.json,Coverage/Unit/MiryamNetworking.json,Coverage/Unit/MiryamPersistence.json,Coverage/Unit/MiryamPlayer.json,Coverage/Unit/MiryamFeatures.json
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: RafaelPlantard/Miryam
          flags: unit-tests
          handle_no_reports_found: true
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          files: TestReports/Unit/MiryamAppUnitTests.junit.xml,TestReports/Unit/MiryamCore.junit.xml,TestReports/Unit/MiryamNetworking.junit.xml,TestReports/Unit/MiryamPersistence.junit.xml,TestReports/Unit/MiryamPlayer.junit.xml,TestReports/Unit/MiryamFeatures.junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: RafaelPlantard/Miryam
          flags: unit-tests
          report_type: test_results
          handle_no_reports_found: true
          fail_ci_if_error: false

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: unit-test-results
          path: |
            TestResults/Unit
            TestReports/Unit
            Coverage/Unit

  snapshot-tests:
    name: Snapshot Tests
    needs: unit-tests
    runs-on: self-hosted
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Mint
        run: which mint || brew install mint

      - name: Bootstrap Mint tools
        run: mint bootstrap

      - name: Generate Xcode project
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: mint run xcodegen generate

      - name: Verify snapshot references exist
        run: |
          COUNT=$(find Packages/MiryamUI/Tests/MiryamSnapshotTests/Snapshots/__Snapshots__ -name '*.png' | wc -l)
          echo "Found $COUNT snapshot reference images"
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No snapshot references found. Record locally with SNAPSHOT_RECORD=all"
            exit 1
          fi

      - name: Prepare snapshot output directories
        run: mkdir -p TestResults/Snapshots TestReports/Snapshots Coverage/Snapshots

      - name: Run iOS snapshot tests
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild test \
            -project Miryam.xcodeproj \
            -scheme MiryamSnapshotTests \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17 Pro Max' \
            -resultBundlePath TestResults/Snapshots/MiryamSnapshotTests.xcresult \
            -enableCodeCoverage YES \
            2>&1 | mint run xcbeautify \
              --report junit \
              --report-path TestReports/Snapshots \
              --junit-report-filename MiryamSnapshotTests.junit.xml

      - name: Run tvOS snapshot tests
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild test \
            -project Miryam.xcodeproj \
            -scheme MiryamTVSnapshotTests \
            -destination 'platform=tvOS Simulator,OS=latest,name=Apple TV 4K (3rd generation)' \
            -resultBundlePath TestResults/Snapshots/MiryamTVSnapshotTests.xcresult \
            -enableCodeCoverage YES \
            2>&1 | mint run xcbeautify \
              --report junit \
              --report-path TestReports/Snapshots \
              --junit-report-filename MiryamTVSnapshotTests.junit.xml

      - name: Install xcresultparser
        if: always()
        run: which xcresultparser || brew install xcresultparser

      - name: Export coverage reports
        if: always()
        run: |
          for bundle in TestResults/Snapshots/*.xcresult; do
            [ -d "$bundle" ] || continue
            name=$(basename "$bundle" .xcresult)
            xcresultparser --output-format cobertura "$bundle" > "Coverage/Snapshots/${name}.xml"
          done

      - name: Install gpg (needed by Codecov)
        if: always()
        run: which gpg || brew install gnupg

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          files: Coverage/Snapshots/MiryamSnapshotTests.xml,Coverage/Snapshots/MiryamTVSnapshotTests.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: RafaelPlantard/Miryam
          flags: snapshot-tests
          handle_no_reports_found: true
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          files: TestReports/Snapshots/MiryamSnapshotTests.junit.xml,TestReports/Snapshots/MiryamTVSnapshotTests.junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: RafaelPlantard/Miryam
          flags: snapshot-tests
          report_type: test_results
          handle_no_reports_found: true
          fail_ci_if_error: false

      - name: Upload snapshot diffs
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: snapshot-diffs
          path: Packages/MiryamUI/Tests/MiryamSnapshotTests/Snapshots/__Snapshots__/
          if-no-files-found: ignore

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: snapshot-test-results
          path: |
            TestResults/Snapshots
            TestReports/Snapshots
            Coverage/Snapshots

  accessibility-tests:
    name: Accessibility Tests
    needs: snapshot-tests
    runs-on: self-hosted
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Mint
        run: which mint || brew install mint

      - name: Bootstrap Mint tools
        run: mint bootstrap

      - name: Generate Xcode project
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: mint run xcodegen generate

      - name: Prepare accessibility output directories
        run: mkdir -p TestResults/Accessibility TestReports/Accessibility Coverage/Accessibility

      - name: Run accessibility tests
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild test \
            -project Miryam.xcodeproj \
            -scheme MiryamAccessibilityXCUITests \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17 Pro Max' \
            -resultBundlePath TestResults/Accessibility/MiryamAccessibilityXCUITests.xcresult \
            -enableCodeCoverage YES \
            2>&1 | mint run xcbeautify \
              --report junit \
              --report-path TestReports/Accessibility \
              --junit-report-filename MiryamAccessibilityXCUITests.junit.xml

      - name: Install xcresultparser
        if: always()
        run: which xcresultparser || brew install xcresultparser

      - name: Export coverage reports
        if: always()
        run: |
          if [ -d TestResults/Accessibility/MiryamAccessibilityXCUITests.xcresult ]; then
            xcresultparser --output-format cobertura TestResults/Accessibility/MiryamAccessibilityXCUITests.xcresult > Coverage/Accessibility/MiryamAccessibilityXCUITests.xml
          fi

      - name: Install gpg (needed by Codecov)
        if: always()
        run: which gpg || brew install gnupg

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          files: Coverage/Accessibility/MiryamAccessibilityXCUITests.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: RafaelPlantard/Miryam
          flags: accessibility-tests
          handle_no_reports_found: true
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          files: TestReports/Accessibility/MiryamAccessibilityXCUITests.junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: RafaelPlantard/Miryam
          flags: accessibility-tests
          report_type: test_results
          handle_no_reports_found: true
          fail_ci_if_error: false

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: accessibility-test-results
          path: |
            TestResults/Accessibility
            TestReports/Accessibility
            Coverage/Accessibility

  ui-smoke-tests:
    name: UI Smoke Tests
    needs: accessibility-tests
    runs-on: self-hosted
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Mint
        run: which mint || brew install mint

      - name: Bootstrap Mint tools
        run: mint bootstrap

      - name: Generate Xcode project
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: mint run xcodegen generate

      - name: Prepare UI smoke output directories
        run: mkdir -p TestResults/UI TestReports/UI Coverage/UI

      - name: Run UI smoke tests
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild test \
            -project Miryam.xcodeproj \
            -scheme MiryamSmokeXCUITests \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17 Pro Max' \
            -resultBundlePath TestResults/UI/MiryamSmokeXCUITests.xcresult \
            -enableCodeCoverage YES \
            2>&1 | mint run xcbeautify \
              --report junit \
              --report-path TestReports/UI \
              --junit-report-filename MiryamSmokeXCUITests.junit.xml

      - name: Install xcresultparser
        if: always()
        run: which xcresultparser || brew install xcresultparser

      - name: Export coverage reports
        if: always()
        run: |
          if [ -d TestResults/UI/MiryamSmokeXCUITests.xcresult ]; then
            xcresultparser --output-format cobertura TestResults/UI/MiryamSmokeXCUITests.xcresult > Coverage/UI/MiryamSmokeXCUITests.xml
          fi

      - name: Install gpg (needed by Codecov)
        if: always()
        run: which gpg || brew install gnupg

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          files: Coverage/UI/MiryamSmokeXCUITests.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: RafaelPlantard/Miryam
          flags: ui-smoke-tests
          handle_no_reports_found: true
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          files: TestReports/UI/MiryamSmokeXCUITests.junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: RafaelPlantard/Miryam
          flags: ui-smoke-tests
          report_type: test_results
          handle_no_reports_found: true
          fail_ci_if_error: false

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: ui-smoke-test-results
          path: |
            TestResults/UI
            TestReports/UI
            Coverage/UI
