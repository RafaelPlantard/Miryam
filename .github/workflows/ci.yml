name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Mint
        run: which mint || brew install mint

      - name: Bootstrap Mint tools
        run: mint bootstrap

      - name: SwiftLint
        run: mint run swiftlint lint --strict

      - name: SwiftFormat check
        run: mint run swiftformat --lint .

  test:
    name: Test
    runs-on: self-hosted
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Mint
        run: which mint || brew install mint

      - name: Bootstrap Mint tools
        run: mint bootstrap

      - name: Generate Xcode project
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: mint run xcodegen generate

      - name: Run tests
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild test \
            -project Miryam.xcodeproj \
            -scheme Miryam \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17 Pro Max' \
            -skip-testing:MiryamSnapshotTests \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            2>&1 | mint run xcbeautify

      # TODO(ci): Raise threshold to 80% after Wave 3 adds unit tests
      # for MiryamNetworking, MiryamPersistence, and MiryamPlayer
      - name: Report coverage
        if: always()
        run: |
          if [ -d TestResults.xcresult ]; then
            COVERAGE=$(xcrun xccov view --report --json TestResults.xcresult \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['lineCoverage']*100)" 2>/dev/null || echo "0")
            echo "Coverage: ${COVERAGE}%"
          else
            echo "No test results found — skipping coverage report"
          fi

      - name: Install xcresultparser
        if: always()
        run: which xcresultparser || brew install xcresultparser

      - name: Export coverage report
        if: always()
        run: |
          if [ -d TestResults.xcresult ]; then
            xcresultparser --output-format cobertura TestResults.xcresult > coverage.xml
          fi

      - name: Install gpg (needed by Codecov)
        if: always()
        run: which gpg || brew install gnupg

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: RafaelPlantard/Miryam
          flags: unit-tests
          fail_ci_if_error: false

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: test-results
          path: TestResults.xcresult

  snapshot-test:
    name: Snapshot Tests
    runs-on: self-hosted
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Mint
        run: which mint || brew install mint

      - name: Bootstrap Mint tools
        run: mint bootstrap

      - name: Generate Xcode project
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: mint run xcodegen generate

      - name: Verify snapshot references exist
        run: |
          echo "=== Snapshot reference images ==="
          find Packages/MiryamUI/Tests/MiryamUITests/Snapshots/__Snapshots__ -name "*.png" | head -20
          echo "Total: $(find Packages/MiryamUI/Tests/MiryamUITests/Snapshots/__Snapshots__ -name '*.png' | wc -l) images"

      - name: Clean derived data
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/Miryam-*
          rm -rf SnapshotTestResults.xcresult

      # Re-record reference images on the CI runner to avoid cross-machine
      # rendering differences (font hinting, display scale, iOS version).
      # The second "Run snapshot tests" step then verifies deterministic rendering.
      - name: Record snapshot references for this environment
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TEST_RUNNER_SNAPSHOT_RECORD: all
        run: |
          xcodebuild test \
            -project Miryam.xcodeproj \
            -scheme Miryam \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17 Pro Max' \
            -only-testing:MiryamSnapshotTests \
            2>&1 | mint run xcbeautify || true
          echo "Recorded $(find Packages/MiryamUI/Tests/MiryamUITests/Snapshots/__Snapshots__ -name '*.png' | wc -l) snapshot references"

      - name: Run snapshot tests
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild test \
            -project Miryam.xcodeproj \
            -scheme Miryam \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17 Pro Max' \
            -only-testing:MiryamSnapshotTests \
            -resultBundlePath SnapshotTestResults.xcresult \
            -enableCodeCoverage YES \
            2>&1 | mint run xcbeautify

      - name: Install xcresultparser
        if: always()
        run: which xcresultparser || brew install xcresultparser

      - name: Export coverage report
        if: always()
        run: |
          if [ -d SnapshotTestResults.xcresult ]; then
            xcresultparser --output-format cobertura SnapshotTestResults.xcresult > snapshot-coverage.xml
          fi

      - name: Install gpg (needed by Codecov)
        if: always()
        run: which gpg || brew install gnupg

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@3f20e214133d0983f9a10f3d63b0faf9241a3daa # v6.0.0
        with:
          files: snapshot-coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: RafaelPlantard/Miryam
          flags: snapshot-tests
          fail_ci_if_error: false

      - name: Upload snapshot diffs
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: snapshot-diffs
          path: Packages/MiryamUI/Tests/MiryamUITests/Snapshots/__Snapshots__/
          if-no-files-found: ignore

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: snapshot-test-results
          path: SnapshotTestResults.xcresult
