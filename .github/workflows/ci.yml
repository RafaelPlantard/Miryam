name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Mint
        run: brew install mint

      - name: Bootstrap Mint tools
        run: mint bootstrap

      - name: SwiftLint
        run: mint run swiftlint lint --strict

      - name: SwiftFormat check
        run: mint run swiftformat --lint .

  test:
    name: Test
    runs-on: macos-15
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Mint
        run: brew install mint

      - name: Bootstrap Mint tools
        run: mint bootstrap

      - name: Generate Xcode project
        run: mint run xcodegen generate

      - name: Run tests
        run: |
          xcodebuild test \
            -project Miryam.xcodeproj \
            -scheme Miryam \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16 Pro' \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            | xcpretty

      - name: Check coverage ≥ 80%
        run: |
          COVERAGE=$(xcrun xccov view --report --json TestResults.xcresult \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['lineCoverage']*100)")
          echo "Coverage: ${COVERAGE}%"
          python3 -c "
          cov = $COVERAGE
          if cov < 80.0:
              raise SystemExit(f'Coverage {cov:.1f}% is below 80% threshold')
          print(f'✅ Coverage {cov:.1f}% passes threshold')
          "

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults.xcresult
