name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Mint
        run: which mint || brew install mint

      - name: Bootstrap Mint tools
        run: mint bootstrap

      - name: SwiftLint
        run: mint run swiftlint lint --strict

      - name: SwiftFormat check
        run: mint run swiftformat --lint .

  test:
    name: Test
    runs-on: self-hosted
    needs: lint
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Mint
        run: which mint || brew install mint

      - name: Bootstrap Mint tools
        run: mint bootstrap

      - name: Generate Xcode project
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: mint run xcodegen generate

      - name: Run tests
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild test \
            -project Miryam.xcodeproj \
            -scheme Miryam \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17 Pro Max' \
            -skip-testing:MiryamSnapshotTests \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            2>&1 | mint run xcbeautify

      # TODO(ci): Raise threshold to 80% after Wave 3 adds unit tests
      # for MiryamNetworking, MiryamPersistence, and MiryamPlayer
      - name: Report coverage
        if: always()
        run: |
          if [ -f TestResults.xcresult ]; then
            COVERAGE=$(xcrun xccov view --report --json TestResults.xcresult \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['lineCoverage']*100)" 2>/dev/null || echo "0")
            echo "Coverage: ${COVERAGE}%"
          else
            echo "No test results found — skipping coverage report"
          fi

      - name: Install gpg (needed by Codecov)
        if: always()
        run: which gpg || brew install gnupg

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: TestResults.xcresult
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: test-results
          path: TestResults.xcresult
