name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'snapshot'
        type: choice
        options:
          - snapshot
          - release
      version:
        description: 'Version (e.g. 1.0.0). Leave empty for current.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to TestFlight
    runs-on: self-hosted
    environment: production
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Mint
        run: which mint || brew install mint

      - name: Setup Ruby via rbenv
        run: eval "$(rbenv init - zsh)" && bundle install

      - name: Bootstrap Mint tools
        run: mint bootstrap

      - name: Generate Xcode project
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: mint run xcodegen generate

      - name: Validate inputs
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format '${{ inputs.version }}'. Expected semver (e.g. 1.0.0)"
            exit 1
          fi

      - name: Determine lane
        id: lane
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TYPE="${{ inputs.release_type }}"
          elif [[ "${{ github.ref_name }}" == *"-SNAPSHOT"* ]]; then
            TYPE="snapshot"
          else
            TYPE="release"
          fi
          if [ "$TYPE" = "release" ]; then
            echo "lane=release" >> "$GITHUB_OUTPUT"
          else
            echo "lane=beta" >> "$GITHUB_OUTPUT"
          fi
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"

      - name: Run fastlane
        run: bundle exec fastlane ${{ steps.lane.outputs.lane }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: miryam-build-${{ github.sha }}
          path: |
            fastlane/builds/*.ipa
            fastlane/builds/*.dSYM.zip
          retention-days: 90
          if-no-files-found: ignore

      - name: Determine version and tag
        if: github.event_name == 'workflow_dispatch'
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep 'CFBundleShortVersionString' project.yml | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi
          TYPE="${{ steps.lane.outputs.type }}"
          if [ "$TYPE" = "snapshot" ]; then
            LAST=$(git tag -l "v${VERSION}-SNAPSHOT.*" | sort -V | tail -1 | grep -oE '[0-9]+$' || echo 0)
            NEXT=$((LAST + 1))
            TAG="v${VERSION}-SNAPSHOT.${NEXT}"
            PRERELEASE="true"
          else
            TAG="v${VERSION}"
            PRERELEASE="false"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Build ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"
          PRERELEASE_FLAG=""
          if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ steps.version.outputs.tag }}" \
            fastlane/builds/*.ipa fastlane/builds/*.dSYM.zip \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            $PRERELEASE_FLAG

      - name: Create GitHub Release (tag-triggered)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *"-SNAPSHOT"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            fastlane/builds/*.ipa fastlane/builds/*.dSYM.zip \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE_FLAG
