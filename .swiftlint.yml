included:
  - Miryam
  - MiryamTests
  - MiryamUITests
  - Packages

excluded:
  - Packages/*/Tests
  - "**/.build"
  - "**/DerivedData"

disabled_rules:
  - trailing_comma
  - opening_brace
  - type_body_length
  - file_length
  - function_body_length

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - modifier_order
  - overridden_super_call

line_length:
  warning: 150
  error: 200

identifier_name:
  min_length:
    warning: 1
  excluded:
    - id
    - x
    - y
    - i

type_name:
  min_length:
    warning: 3
  excluded:
    - DI
    - UI
