ignore:
  - "MiryamTests/**"
  - "MiryamWatchTests/**"
  - "MiryamVisionTests/**"
  - "Packages/**/Tests/**"
  - "Packages/**/.build/**"
  - "**/*.derived/**"
  - "**/Snapshots/__Snapshots__/**"
  - "TestResults/**"
  - "TestReports/**"
  - "Coverage/**"

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto

flag_management:
  individual_flags:
    - name: unit-tests
      statuses:
        - type: project
          target: auto
    - name: snapshot-tests
      statuses:
        - type: project
          target: auto
    - name: accessibility-tests
      statuses:
        - type: project
          target: auto
    - name: ui-smoke-tests
      statuses:
        - type: project
          target: auto

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  branches:
    - main
